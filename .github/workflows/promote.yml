name: Daily Social Media Promotion
on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install httpx pyyaml
      - name: Auto-post to Bluesky
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          SITE_URL: "https://dasguptateach-web.github.io/ScholarScript"
        run: python .github/scripts/social_post.py
      - name: Generate copy-paste posts for Reddit/LinkedIn/Facebook
        run: python .github/scripts/generate_posts.py
      - name: Commit generated posts
        run: |
          git config user.email "scholarscript@users.noreply.github.com"
          git config user.name "ScholarScript Bot"
          git add social-posts/
          git diff --staged --quiet || git commit -m "Update social media post drafts"
          git push
