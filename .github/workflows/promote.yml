name: Daily Massive Promotion
on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install httpx pyyaml
      - name: Auto-post new content to Bluesky & Twitter
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          SITE_URL: "https://dasguptateach-web.github.io/ScholarScript"
        run: python .github/scripts/social_post.py
      - name: Generate copy-paste posts for Reddit/LinkedIn/Facebook/Newsletter
        run: python .github/scripts/generate_posts.py
      - name: Ping search engines for faster indexing
        run: |
          pip install httpx
          python .github/scripts/ping_search_engines.py
      - name: Submit site to free educational directories
        run: python .github/scripts/submit_directories.py
      - name: Re-promote popular existing content
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          SITE_URL: "https://dasguptateach-web.github.io/ScholarScript"
        run: python .github/scripts/repeat_promote.py
      - name: Commit generated posts & promotion logs
        run: |
          git config user.email "scholarscript@users.noreply.github.com"
          git config user.name "ScholarScript Bot"
          git add social-posts/ .promotion-logs/
          git diff --staged --quiet || git commit -m "Daily promotion update $(date +'%Y-%m-%d')"
          git push
