{% extends "base.html" %}
{% block content %}
<div class="archive-header">
  <h2>Tags</h2>
</div>
<div class="tag-cloud">
{% for tag, items in tags.items() %}
  <span class="tag" style="font-size: {{ [0.8 + (items|length * 0.1), 2.0] | min }}em">
    <a href="#{{ tag }}" style="color:inherit;">{{ tag }} ({{ items|length }})</a>
  </span>
{% endfor %}
</div>

{% for tag, items in tags.items() %}
<section style="margin-bottom:2rem;">
  <h3 style="font-size:1.2rem;color:var(--color-primary-dark);margin-bottom:0.75rem;">{{ tag }}</h3>
  <ul style="list-style:none;margin:0;">
  {% for item in items %}
    <li style="padding:0.35rem 0;border-bottom:1px solid var(--color-border);">
      <a href="{{ base_url }}/{{ item.type }}/{{ item.slug }}/" style="font-weight:500;">{{ item.title }}</a>
      <span class="meta" style="display:inline;margin-left:0.5rem;">{{ item.date }}</span>
    </li>
  {% endfor %}
  </ul>
</section>
{% endfor %}
{% endblock %}
