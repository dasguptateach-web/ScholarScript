site:
  title: ScholarScript
  tagline: "Scripted for Scholars. Powered by Automation."
  domain: dasguptateach-web.github.io
  base_url: https://dasguptateach-web.github.io/ScholarScript
  author: "ScholarScript Team"
  language: en
  locale: en_US

theme: classic

# ─── MONETIZATION ───────────────────────────────────────────
# Get your AdSense code from https://adsense.google.com
adsense:
  client_id: ""              # ← FILL THIS: looks like ca-pub-1234567890123456
  enabled: true

# Free analytics at https://www.goatcounter.com
goatcounter:
  code: "scholar"            # ← DONE: GoatCounter site code

# Email service for prize notifications (free tier at https://resend.com)
resend:
  api_key: ""                # ← FILL THIS: re_xxxxxxx
  owner_email: dasguptateach@gmail.com

prize:
  amount: 25                 # Monthly Best Contributor prize in USD

# Affiliate programs (earn commission on book links)
affiliate:
  amazon_tag: ""             # ← FILL THIS: your Amazon affiliate tag
  bookshop_id: ""            # ← FILL THIS: your Bookshop.org affiliate ID

# ─── SOCIAL MEDIA HANDLES (for footer links & Twitter Card) ──
social:
  twitter: "ScholarScript73" # ← DONE: Twitter handle (without @)
  facebook: "profile.php?id=61592063721692"  # ← DONE: Facebook page ID
  linkedin: ""               # ← FILL THIS: your LinkedIn profile name
  youtube: ""                # ← FILL THIS: your YouTube channel name
  bluesky: "scholarscript.bsky.social"  # ← DONE: Bluesky handle

# ─── CONTENT INGESTION ──────────────────────────────────────
ingestion:
  auto_ingest: true
  schedule: "every 5 minutes"

submissions:
  auto_mode: true

plugins:
  enabled:
    - reading_time
    - latex_renderer

hreflang: {}
