{% extends "base.html" %}
{% block content %}
<div class="archive-header" data-aos="fade-up">
  <h2><i class="fas fa-tags"></i> Tags</h2>
</div>
<div class="tag-cloud" data-aos="fade-up">
{% for tag, items in tags.items() %}
  <a href="#{{ tag }}" class="tag" style="font-size: {{ [0.82 + (items|length * 0.12), 1.8] | min }}em"><i class="fas fa-tag"></i> {{ tag }} ({{ items|length }})</a>
{% endfor %}
</div>

{% for tag, items in tags.items() %}
<section style="margin-bottom:2rem;" data-aos="fade-up">
  <h3 style="font-size:1.15rem;font-weight:700;color:var(--primary-dark);margin-bottom:0.75rem;display:flex;align-items:center;gap:0.4rem;">
    <i class="fas fa-tag" style="color:var(--primary-light);"></i> {{ tag }}
  </h3>
  <ul style="list-style:none;margin:0;">
  {% for item in items %}
    <li style="padding:0.45rem 0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:0.5rem;flex-wrap:wrap;">
      <a href="{{ base_url }}/{{ item.type }}/{{ item.slug }}/" style="font-weight:500;color:var(--text);">
        <i class="fas fa-chevron-right" style="font-size:0.65rem;color:var(--primary-light);margin-right:0.3rem;"></i>
        {{ item.title }}
      </a>
      <span class="meta" style="margin:0;white-space:nowrap;"><i class="fas fa-calendar-alt"></i> {{ item.date }}</span>
    </li>
  {% endfor %}
  </ul>
</section>
{% endfor %}
{% endblock %}
